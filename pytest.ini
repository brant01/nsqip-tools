[pytest]
# pytest configuration for nsqip_tools

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers
markers =
    integration: Integration tests that use real datasets
    slow: Tests that take a long time to run
    unit: Unit tests that use mock data

# Coverage options (if pytest-cov is installed)
# --cov=nsqip_tools
# --cov-report=html
# --cov-report=term-missing

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning